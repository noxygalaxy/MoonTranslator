name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release Version (e.g. v1.0.0)"
        required: true
        type: string
        default: "v1.0.0"
      release_title:
        description: "Release Title"
        required: true
        type: string
        default: "New Release"

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
            installer -> target

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri App
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Package Portable App
        shell: pwsh
        run: |
          mkdir MoonTranslator_Portable
          Copy-Item "src-tauri\target\release\moon*.exe" "MoonTranslator_Portable\"
          Copy-Item "public\icon.ico" "MoonTranslator_Portable\"
          Compress-Archive -Path "MoonTranslator_Portable\*" -DestinationPath "MoonTranslator-App-${{ github.event.inputs.version }}-portable.zip"

      - name: Cache Custom Installer Binary
        id: cache-installer
        uses: actions/cache@v4
        with:
          path: installer/target/release/moontranslator_installer.exe
          key: ${{ runner.os }}-installer-bin-${{ hashFiles('installer/src/**', 'installer/Cargo.*') }}

      - name: Build Custom Installer
        if: steps.cache-installer.outputs.cache-hit != 'true'
        run: |
          cd installer
          cargo build --release

      - name: Package Custom Installer
        shell: pwsh
        run: |
          Copy-Item "installer\target\release\moontranslator_installer.exe" "MoonTranslator-Installer.exe"

      - name: Read Release Notes
        shell: pwsh
        run: |
          "RELEASE_BODY<<EOF" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Get-Content -Path "RELEASE_NOTES.md" -Raw | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "EOF" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.release_title }}
          body: ${{ env.RELEASE_BODY }}
          files: |
            MoonTranslator-App-${{ github.event.inputs.version }}-portable.zip
            MoonTranslator-Installer.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
